# Nginx reverse-proxy configuration for tei-annotator webservice.
#
# The HTML demo (/) is publicly accessible over HTTPS.
# The API (/api/*) is restricted to localhost (127.0.0.1 / ::1) only.
#
# Setup:
#   1. sudo cp webservice/nginx.conf /etc/nginx/sites-available/tei-annotator
#   2. sudo ln -s /etc/nginx/sites-available/tei-annotator /etc/nginx/sites-enabled/
#   3. Replace YOUR_DOMAIN with your actual domain (3 occurrences):
#        sudo sed -i 's/YOUR_DOMAIN/your.domain.example/g' \
#            /etc/nginx/sites-available/tei-annotator
#   4. Test the config (HTTPS will fail until the certificate exists — that is expected):
#        sudo nginx -t && sudo systemctl reload nginx
#   5. Install certbot if needed:
#        sudo apt install certbot python3-certbot-nginx   # Debian/Ubuntu
#        sudo dnf install certbot python3-certbot-nginx   # RHEL/Fedora
#   6. Obtain a Let's Encrypt certificate (certbot updates the ssl_* paths automatically):
#        sudo certbot --nginx -d your.domain.example
#   7. Reload nginx and verify auto-renewal:
#        sudo systemctl reload nginx
#        sudo certbot renew --dry-run
#
# To run the webservice as a systemd service, see webservice/tei-annotator.service.

upstream tei_annotator {
    server 127.0.0.1:8099;
    keepalive 16;
}

# ── HTTP: redirect everything to HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let certbot's ACME challenge through, redirect everything else
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: public demo + localhost-only API ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # Paths written by certbot --nginx (or --webroot); update if using a
    # different certificate tool or path.
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Public: HTML demo and static assets ──────────────────────────────────
    location / {
        proxy_pass         http://tei_annotator;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 360s;
    }

    # ── Restricted: API endpoints — localhost only ────────────────────────────
    location /api/ {
        allow 127.0.0.1;
        allow ::1;
        deny  all;                       # external clients get 403

        proxy_pass         http://tei_annotator;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 360s;         # long-running evaluate calls
    }
}

# ── Certbot setup instructions ────────────────────────────────────────────────
# After placing this file and reloading nginx, run once:
#
#   sudo certbot --nginx -d YOUR_DOMAIN
#
# certbot will:
#   - obtain a Let's Encrypt certificate
#   - write the ssl_certificate / ssl_certificate_key paths
#     (already pre-filled above; certbot will verify/overwrite them)
#   - add a cron / systemd timer for automatic renewal
#
# To verify auto-renewal works:
#   sudo certbot renew --dry-run
#
# If certbot is not installed:
#   sudo apt install certbot python3-certbot-nginx   # Debian/Ubuntu
#   sudo dnf install certbot python3-certbot-nginx   # RHEL/Fedora
